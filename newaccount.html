<html>
<head>
    <title>Sign up</title>
    <link rel="stylesheet" href="newaccount.css">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
	  <script src="script2.js"></script>
</head>

<body>
    
    <div class="form-container">
	<p class="title">Login</p>
	<form class="form">
		<div class="input-group">
			<input type="text" name="firstname" id="firstname" placeholder="First Name:">
		</div>
        
        <div class="input-group">
			<input type="text" name="lastname" id="lastname" placeholder="Last Name:">
		</div>
        
          <div class="input-group">
			<input type="email" name="email" id="email" placeholder="Email:">
		</div>
        
         <div class="input-group">
			<input type="text" name="username" id="username" placeholder="Username:">
		</div>
        
		<div class="input-group">
			<input type="password" name="password" id="password" placeholder="Password">
		</div>
        
        <div class="input-group">
			<input type="password" name="comfirmpassword" id="comfirmpassword" placeholder="Confirm Password:">
		</div>
        
        <button class="sign"><a href="rateus.html">Submit</a></button>
	</form>
	
	<p class="signup">already have an account?
		<a rel="noopener noreferrer" href="signin.html" class="signin">Sign in</a>
	</p>
</div> 











    </body>


</html>
